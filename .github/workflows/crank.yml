name: VeriBet Automated Settlement Crank

on:
  schedule:
    # Triggers every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub UI to test

jobs:
  run-crank:
    runs-on: ubuntu-latest
    environment: devnet

    # Inject secrets into the job environment so all steps can access them safely
    env:
      RPC_URL: ${{ secrets.RPC_URL }}
      VERIBET_PROGRAM_ID: ${{ secrets.VERIBET_PROGRAM_ID }}
      ORACLE_PUBLIC_KEY: ${{ secrets.ORACLE_PUBLIC_KEY }}
      CRANK_SIGNER_KEY: ${{ secrets.CRANK_SIGNER_KEY }}
      TXLINE_API_ORIGIN: https://txline-dev.txodds.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './services/crank/package-lock.json'

      - name: Install Dependencies
        run: |
          cd services/crank
          npm ci

      - name: Verify Secret Availability
        env:
          CRANK_SIGNER_KEY: ${{ secrets.CRANK_SIGNER_KEY }}
        run: |
          set -euo pipefail
          # Use parameter expansion to avoid unbound variable errors and avoid echoing secrets
          if [ -z "${CRANK_SIGNER_KEY:-}" ]; then
            echo "CRITICAL: CRANK_SIGNER_KEY is not set. Check repository or environment secrets and environment protection rules."
            exit 1
          else
            echo "SUCCESS: Cryptographic signer allocation is present in memory."
          fi

      - name: Execute Settlement Engine
        run: |
          cd services/crank
          npx ts-node src/main.ts
        # secrets are already provided at the job level via `env:` above