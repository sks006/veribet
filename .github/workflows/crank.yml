name: VeriBet Automated Settlement Crank

on:
  schedule:
    # Triggers every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub UI to test

jobs:
  run-crank:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './services/crank/package-lock.json'

      - name: Install Dependencies
        run: |
          cd services/crank
          npm ci

      - name: Execute Settlement Engine
        run: |
          cd services/crank
          npx ts-node src/main.ts
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          VERIBET_PROGRAM_ID: ${{ secrets.VERIBET_PROGRAM_ID }}
          CRANK_SIGNER_KEY: ${{ secrets.CRANK_SIGNER_KEY }}
          TXLINE_API_ORIGIN: https://txline-dev.txodds.com
          ORACLE_PUBLIC_KEY: ${{ secrets.ORACLE_PUBLIC_KEY }}
