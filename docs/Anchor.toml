## 🔍 Deep Dive: How VeriBet Stands Out

### 1. The Setup & Activation Loop (Step-by-Step UX)
Instead of forcing users to configure complex API credentials manually, we built a developer/admin wizard at `/setup` that handles the entire TxLINE subscription lifecycle:
1. **Authorize:** Obtains a guest JWT from TxLINE's auth start endpoint.
2. **On-Chain Subscribe:** Triggers the Solana Devnet `subscribe` instruction using Token-2022.
3. **Activate:** Signs the proof message with the wallet and requests the activated API token.
4. **Deploy:** Saves the configuration directly to the server backend.

### 2. On-Chain Cryptographic Proof Anchoring
When a match completes, our Crank Service:
1. Listens to the SSE Stream event.
2. Verifies the signature off-chain.
3. Submits the match outcome along with the SHA-256 Merkle `proof_hash` to the smart contract's `resolve_market` instruction.
4. The smart contract commits the `proof_hash` to the public state on Solana, securing it from counterparty tampering.

### 3. Strict Compliance with the "No P2P Transfers" Rule
As mandated, `TXL` tokens are restricted to our protocol-level PDA interface. User wagers are handled via an independent pool using native `SOL` / wrapped tokens. This allows players to bet trustlessly while keeping data access authorization fully locked inside the Solana program boundaries.

